<!DOCTYPE html>

<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f9f9ff;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center">
<!-- Top Decorative Illustration Section -->
<div class="w-full max-w-md px-container-padding flex flex-col items-center">
<div class="relative w-full aspect-video mb-lg overflow-hidden rounded-2xl shadow-[0_20px_50px_rgba(32,138,138,0.1)]">
<img class="w-full h-full object-cover" data-alt="A highly detailed 3D digital illustration of a futuristic, sustainable mining site in Bandung Regency. The scene features clean energy machinery and drones operating in a lush, green valley under bright, high-key morning light. The visual style is minimal and premium, utilizing a color palette of Primary Emerald and soft whites to convey high-tech efficiency and ecological oversight." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6ZVrXxof-jWOLXP0dkfmr2pLIGrnFrPp_ePdto5MXoZ6b1Fqfwrnvao0TkG9NoS0iWta0J41n6xHi3gw5Ff6IrZrwk-EbILuQ0y8zNdCElNH4RHRihyX2ffEJpY3crY1z3XnTO-XGs1FEAFSxFwbK5esuxr1FiLjOUYa7kPcvZQFnclRhdyy13sz199V9FgMZAjknPwfBRoFJaQGV3SlFB-huMkNgRi3aDtR1_KGrGbbMkzWuCFPfvCb8te-QkYYK0ker-3aUvaI"/>
<div class="absolute inset-0 bg-gradient-to-t from-background/80 to-transparent"></div>
</div>
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">Portal Petugas</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Akses sistem pengawasan pertambangan terpadu.</p>
</div>
<!-- Login Form Canvas -->
<div class="w-full space-y-md">
<!-- Username Input -->
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<input class="w-full bg-surface-container-lowest border-none rounded-2xl py-4 pl-12 pr-4 shadow-[0_8px_30px_rgba(0,0,0,0.02)] focus:ring-2 focus:ring-primary/20 text-on-surface font-body-md transition-all outline-none" placeholder="Username atau NIP" type="text"/>
</div>
<!-- Password Input -->
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border-none rounded-2xl py-4 pl-12 pr-4 shadow-[0_8px_30px_rgba(0,0,0,0.02)] focus:ring-2 focus:ring-primary/20 text-on-surface font-body-md transition-all outline-none" placeholder="Kata Sandi" type="password"/>
<div class="absolute inset-y-0 right-4 flex items-center text-outline cursor-pointer">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end px-xs">
<a class="font-label-caps text-label-caps text-primary hover:text-primary-container transition-colors" href="#">Lupa Password</a>
</div>
<!-- Login Button -->
<button class="w-full mt-lg relative group overflow-hidden rounded-full p-[1px] focus:outline-none">
<div class="absolute inset-0 bg-gradient-to-r from-primary to-secondary transition-all duration-300 group-hover:opacity-90"></div>
<div class="relative flex items-center justify-center py-4 glass-panel rounded-full transition-transform active:scale-95">
<span class="font-title-sm text-title-sm text-primary group-hover:text-primary-container">Masuk ke Dashboard</span>
</div>
</button>
</div>
<!-- Secondary Actions -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant/60">Belum memiliki akun akses?</p>
<button class="mt-xs font-label-caps text-label-caps text-outline hover:text-primary transition-colors">HUBUNGI ADMINISTRATOR</button>
</div>
<!-- Brand Footer -->
<div class="mt-auto pt-xl pb-md flex items-center gap-xs opacity-40 grayscale">
<span class="material-symbols-outlined text-primary" data-icon="shield">shield</span>
<p class="font-label-caps text-label-caps tracking-widest">KABUPATEN BANDUNG • 2024</p>
</div>
</div>
<!-- Soft Ambient Background Glows -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full -z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 blur-[120px] rounded-full -z-10"></div>
</body></html>
